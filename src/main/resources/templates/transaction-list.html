<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Module - Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body>
<main class="page">
    <section class="panel">
        <h1 class="page-title">Transaction Records</h1>
        <p class="subtitle">Issue and return history for all users.</p>

        <p class="alert alert-success" th:if="${transactionMessage}" th:text="${transactionMessage}"></p>
        <p class="alert alert-error" th:if="${transactionError}" th:text="${transactionError}"></p>

        <div class="link-row" aria-label="Page Actions">
            <a class="link-chip" th:href="@{/dashboard}">Dashboard</a>
            <a class="link-chip" th:href="@{/fines}">Fines</a>
        </div>

        <div class="panel panel-shell" style="margin-top:14px;">
            <h2 style="margin-top:0;">Issue / Return From Transaction Page</h2>
            <form th:action="@{/transactions/issue}" th:object="${transaction}" method="post" class="row grid-2">
                <input class="input" type="number" th:field="*{userId}" placeholder="User ID" required>
                <input class="input" type="number" th:field="*{bookId}" placeholder="Book ID" required>
                <input class="input" type="number" name="dueDays" placeholder="Due Days (default 14)">
                <label class="inline-check" style="grid-column:1 / -1;">
                    <input type="checkbox" name="overdueDemo" value="true">
                    Overdue Demo (-1 due days)
                </label>
                <button class="btn btn-accent" type="submit" style="grid-column:1 / -1;">Issue Book</button>
            </form>

            <form th:action="@{/transactions/return}" method="post" class="row" style="margin-top:12px;">
                <input class="input" type="number" name="transactionId" placeholder="Transaction ID to Return" required>
                <button class="btn btn-secondary" type="submit">Return Book</button>
            </form>
        </div>

        <div class="table-wrap" th:if="${!#lists.isEmpty(transactions)}">
            <table>
                <thead>
                <tr>
                    <th>T/ID</th>
                    <th>User ID</th>
                    <th>Book ID</th>
                    <th>Book Name</th>
                    <th>Issue Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="txn : ${transactions}">
                    <td th:text="${txn.id}">1</td>
                    <td th:text="${txn.userId}">1</td>
                    <td th:text="${txn.bookId}">1</td>
                    <td th:text="${bookTitleById.get(txn.bookId) != null ? bookTitleById.get(txn.bookId) : 'Unknown Book'}">Effective Java</td>
                    <td th:text="${txn.issueDate}">2026-04-10</td>
                    <td th:text="${txn.dueDate}">2026-04-24</td>
                    <td>
                        <span class="tag" th:text="${txn.status}">ISSUED</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <p class="empty" th:if="${#lists.isEmpty(transactions)}">No transactions found yet.</p>

        <div th:replace="~{fragments/layout :: moduleFooter('Transaction Module', 'Prashant Radder')}"></div>

    </section>
</main>
</body>
</html>
