# Embedded database by default so a fresh clone starts without external setup.
# Override DB_URL/DB_USERNAME/DB_PASSWORD/DB_DRIVER/DB_DIALECT to use MySQL.
spring.datasource.url=${DB_URL:jdbc:h2:mem:smart_library;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console